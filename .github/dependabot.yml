version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      rust-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/asherah-node"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/asherah-py"
    schedule:
      interval: "weekly"

  - package-ecosystem: "maven"
    directory: "/asherah-java/java"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
