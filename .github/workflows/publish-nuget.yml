name: Publish to NuGet.org

concurrency:
  group: publish-nuget
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["Release Asherah Native Library"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    # workflow_run fires whenever release-cobhan completes — including
    # workflow_dispatch reruns of the latter. Auto-firing in that case
    # would re-publish whatever asset set is "latest" (since the dispatch
    # ref is not a release tag) under a freshly-bumped version variable,
    # which is not what anyone wants. Restrict auto-firing to release-event
    # upstreams; manual workflow_dispatch on this workflow still works.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Set version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REPO_VERSION: ${{ vars.NUGET_VERSION }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ -n "$REPO_VERSION" ]; then
            VERSION="$REPO_VERSION"
          else
            echo "::error::Neither input version nor NUGET_VERSION repo variable is set"
            exit 1
          fi
          if ! printf '%s\n' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be semver X.Y.Z with no label (got: ${VERSION}). Prerelease -alpha is appended automatically for NuGet pack."
            exit 1
          fi
          PACK_VERSION="${VERSION}-alpha"
          echo "NuGet base (repo variable / bump): ${VERSION}"
          echo "NuGet package version (pack/push): ${PACK_VERSION}"
          echo "NUGET_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "NUGET_PACKAGE_VERSION=${PACK_VERSION}" >> "$GITHUB_ENV"

      - name: Download native libraries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Use the tag from the triggering workflow_run only when the
          # upstream was a release event (head_branch is the tag). For
          # workflow_dispatch upstreams, head_branch is the dispatched ref
          # (e.g. "main"), which is not a release tag — fall back to latest.
          if [ "$WORKFLOW_RUN_EVENT" = "release" ] && [ -n "$WORKFLOW_RUN_BRANCH" ]; then
            TAG="$WORKFLOW_RUN_BRANCH"
          else
            TAG="$(gh release list --limit 1 --json tagName -q '.[0].tagName')"
          fi
          echo "Downloading native libs from release ${TAG}"

          NATIVE_DIR="asherah-dotnet/src/GoDaddy.Asherah.Encryption/runtimes"

          mkdir -p "$NATIVE_DIR/linux-x64/native"
          mkdir -p "$NATIVE_DIR/linux-arm64/native"
          mkdir -p "$NATIVE_DIR/linux-musl-x64/native"
          mkdir -p "$NATIVE_DIR/linux-musl-arm64/native"
          mkdir -p "$NATIVE_DIR/osx-x64/native"
          mkdir -p "$NATIVE_DIR/osx-arm64/native"
          mkdir -p "$NATIVE_DIR/win-x64/native"
          mkdir -p "$NATIVE_DIR/win-arm64/native"

          # Download cobhan-named assets from release, rename to _ffi naming for .NET
          gh release download "$TAG" -p 'libasherah-x64.so'           -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-arm64.so'         -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-x64-musl.so'      -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-arm64-musl.so'    -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-x64.dylib'        -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-arm64.dylib'      -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-x64.dll'          -D /tmp/native-dl || true
          gh release download "$TAG" -p 'libasherah-arm64.dll'        -D /tmp/native-dl || true

          cp /tmp/native-dl/libasherah-x64.so          "$NATIVE_DIR/linux-x64/native/libasherah_ffi.so"
          cp /tmp/native-dl/libasherah-arm64.so        "$NATIVE_DIR/linux-arm64/native/libasherah_ffi.so"
          cp /tmp/native-dl/libasherah-x64-musl.so     "$NATIVE_DIR/linux-musl-x64/native/libasherah_ffi.so"
          cp /tmp/native-dl/libasherah-arm64-musl.so   "$NATIVE_DIR/linux-musl-arm64/native/libasherah_ffi.so"
          cp /tmp/native-dl/libasherah-x64.dylib       "$NATIVE_DIR/osx-x64/native/libasherah_ffi.dylib"
          cp /tmp/native-dl/libasherah-arm64.dylib     "$NATIVE_DIR/osx-arm64/native/libasherah_ffi.dylib"
          # Windows binaries may not exist yet — skip if missing
          [ -f /tmp/native-dl/libasherah-x64.dll ]  && cp /tmp/native-dl/libasherah-x64.dll   "$NATIVE_DIR/win-x64/native/asherah_ffi.dll"
          [ -f /tmp/native-dl/libasherah-arm64.dll ] && cp /tmp/native-dl/libasherah-arm64.dll "$NATIVE_DIR/win-arm64/native/asherah_ffi.dll"

          echo "Native libraries staged:"
          find "$NATIVE_DIR" -type f | sort

      - name: Pack
        working-directory: asherah-dotnet
        run: |
          # Pack core (contains native libs)
          dotnet pack src/GoDaddy.Asherah.Encryption/GoDaddy.Asherah.Encryption.csproj -c Release \
            /p:Version="${NUGET_PACKAGE_VERSION}" \
            /p:PackageOutputPath="$GITHUB_WORKSPACE/dist" \
            /p:RestoreLockedMode=true
          # Pack compat (references core, no native libs)
          dotnet pack src/GoDaddy.Asherah.Encryption.Compat/GoDaddy.Asherah.Encryption.Compat.csproj -c Release \
            /p:Version="${NUGET_PACKAGE_VERSION}" \
            /p:PackageOutputPath="$GITHUB_WORKSPACE/dist" \
            /p:RestoreLockedMode=true

      - name: Verify native libraries in core package
        run: |
          # Only verify the core package — the Compat package has no native libs
          for pkg in dist/*.nupkg; do
            echo "=== $pkg ==="
            if echo "$pkg" | grep -q "Compat"; then
              echo "  (Compat package — no native libraries expected, skipping)"
              continue
            fi
            unzip -l "$pkg" | grep -E 'native|runtimes' | sort
            for required in linux-x64 linux-arm64 linux-musl-x64 linux-musl-arm64 osx-x64 osx-arm64; do
              if ! unzip -l "$pkg" | grep -q "runtimes/${required}/native/"; then
                echo "ERROR: Missing required native library for ${required}"
                exit 1
              fi
            done
            COUNT=$(unzip -l "$pkg" | grep -c "runtimes/.*/native/.*\.\(so\|dylib\|dll\)$" || true)
            echo "$COUNT native libraries bundled (6 required, Windows optional)"
          done

      - name: Publish to NuGet.org
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true') }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_TOKEN }}
        run: |
          dotnet nuget push dist/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY"

      - name: Dry run
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run complete. Would publish:"
          ls -lh dist/

      - name: Bump NUGET_VERSION patch
        if: ${{ vars.NUGET_VERSION != '' && (github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')) }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          MAJOR=$(echo "$NUGET_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NUGET_VERSION" | cut -d. -f2)
          PATCH=$(echo "$NUGET_VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          gh variable set NUGET_VERSION --body "${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "Bumped NUGET_VERSION to ${MAJOR}.${MINOR}.${NEXT_PATCH}"
