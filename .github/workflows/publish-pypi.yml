name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to build from (default: current branch)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  build-wheels:
    strategy:
      matrix:
        include:
          # Linux x86_64 — manylinux_2_28 (glibc 2.28, RHEL 8+/Ubuntu 20.04+)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          # Linux ARM64 — cross-compiled
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          # Linux musl x86_64 (Alpine)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          # Linux musl ARM64 (Alpine)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          # macOS universal2 (x86_64 + ARM64 fat binary)
          - os: macos-latest
            target: universal2-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Set version
        shell: bash
        run: |
          BETA="${{ vars.PYPI_BETA_VERSION }}"
          if [ -z "$BETA" ]; then
            echo "::error::Repository variable PYPI_BETA_VERSION is not set"
            exit 1
          fi
          VERSION="0.4.0b${BETA}"
          echo "Publishing version: ${VERSION}"
          echo "PYPI_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "PYPI_BETA=${BETA}" >> "$GITHUB_ENV"
          # Update pyproject.toml version (PEP 440: 0.4.0bN)
          sed -i.bak 's/^version = ".*"/version = "'"${VERSION}"'"/' asherah-py/pyproject.toml
          rm -f asherah-py/pyproject.toml.bak
          # Update Cargo.toml version (semver: 0.4.0-beta.N)
          sed -i.bak 's/^version = ".*"/version = "0.4.0-beta.'"${BETA}"'"/' asherah-py/Cargo.toml
          rm -f asherah-py/Cargo.toml.bak

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: >-
            --release
            --manifest-path asherah-py/Cargo.toml
            --out dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set version
        run: |
          BETA="${{ vars.PYPI_BETA_VERSION }}"
          if [ -z "$BETA" ]; then
            echo "::error::Repository variable PYPI_BETA_VERSION is not set"
            exit 1
          fi
          VERSION="0.4.0b${BETA}"
          sed -i 's/^version = ".*"/version = "'"${VERSION}"'"/' asherah-py/pyproject.toml
          sed -i 's/^version = ".*"/version = "0.4.0-beta.'"${BETA}"'"/' asherah-py/Cargo.toml

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path asherah-py/Cargo.toml --out dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: List packages
        run: ls -lh dist/

      - name: Publish to PyPI
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          pip install twine
          twine check dist/*
          echo ""
          echo "Dry run complete. Would publish:"
          ls -lh dist/

      - name: Increment beta version
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BETA="${{ vars.PYPI_BETA_VERSION }}"
          NEXT=$(( BETA + 1 ))
          if gh variable set PYPI_BETA_VERSION --body "$NEXT" 2>/dev/null; then
            echo "Bumped PYPI_BETA_VERSION from ${BETA} to ${NEXT}"
          else
            echo "::warning::Auto-increment failed. Manually set PYPI_BETA_VERSION to ${NEXT}."
          fi
