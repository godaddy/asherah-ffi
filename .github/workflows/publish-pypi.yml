name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to build from (default: current branch)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      beta: ${{ steps.resolve.outputs.beta }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Find next available version
        id: resolve
        run: |
          BETA="${{ vars.PYPI_BETA_VERSION }}"
          if [ -z "$BETA" ]; then
            echo "::error::Repository variable PYPI_BETA_VERSION is not set"
            exit 1
          fi
          # Advance past any already-published versions
          while pip index versions asherah 2>/dev/null | grep -q "0.5.0b${BETA}"; do
            echo "asherah==0.5.0b${BETA} already exists on PyPI, trying next..."
            BETA=$(( BETA + 1 ))
          done
          VERSION="0.5.0b${BETA}"
          echo "Will publish version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "beta=${BETA}" >> "$GITHUB_OUTPUT"

  build-wheels:
    needs: resolve-version
    strategy:
      matrix:
        include:
          # Linux x86_64 — manylinux_2_28 (glibc 2.28, RHEL 8+/Ubuntu 20.04+)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          # Linux ARM64 — cross-compiled
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          # Linux musl x86_64 (Alpine)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          # Linux musl ARM64 (Alpine)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          # macOS universal2 (x86_64 + ARM64 fat binary)
          - os: macos-latest
            target: universal2-apple-darwin
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.rust_targets || matrix.target }}

      - name: Set version
        shell: bash
        env:
          PYPI_VERSION: ${{ needs.resolve-version.outputs.version }}
          PYPI_BETA: ${{ needs.resolve-version.outputs.beta }}
        run: |
          echo "Publishing version: ${PYPI_VERSION}"
          # Update pyproject.toml version (PEP 440: 0.5.0bN)
          sed -i.bak 's/^version = ".*"/version = "'"${PYPI_VERSION}"'"/' asherah-py/pyproject.toml
          rm -f asherah-py/pyproject.toml.bak
          # Update Cargo.toml version (semver: 0.5.0-beta.N)
          sed -i.bak 's/^version = ".*"/version = "0.5.0-beta.'"${PYPI_BETA}"'"/' asherah-py/Cargo.toml
          rm -f asherah-py/Cargo.toml.bak

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          rust-toolchain: "1.88.0"
          before-script-linux: |
            # aws-lc-sys requires cmake; install it if missing
            if command -v yum &>/dev/null; then
              yum install -y cmake3 perl-IPC-Cmd || yum install -y cmake perl-IPC-Cmd || true
              ln -sf cmake3 /usr/local/bin/cmake 2>/dev/null || true
            elif command -v apk &>/dev/null; then
              apk add --no-cache cmake make perl
            fi
          args: >-
            --release
            --manifest-path asherah-py/Cargo.toml
            --out dist/

      - name: Remove non-abi3 wheels
        shell: bash
        run: |
          # generate-import-lib causes maturin to also build for free-threaded
          # Python interpreters on the runner. Only keep the abi3 wheel.
          for f in dist/*.whl; do
            case "$f" in
              *abi3*) echo "keep: $f" ;;
              *) echo "remove: $f"; rm -f "$f" ;;
            esac
          done

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1

  build-sdist:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set version
        env:
          PYPI_VERSION: ${{ needs.resolve-version.outputs.version }}
          PYPI_BETA: ${{ needs.resolve-version.outputs.beta }}
        run: |
          sed -i 's/^version = ".*"/version = "'"${PYPI_VERSION}"'"/' asherah-py/pyproject.toml
          sed -i 's/^version = ".*"/version = "0.5.0-beta.'"${PYPI_BETA}"'"/' asherah-py/Cargo.toml

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path asherah-py/Cargo.toml --out dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [resolve-version, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install twine
        run: pip install twine

      - name: List packages
        run: ls -lh dist/

      - name: Publish to PyPI
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine check dist/*
          for attempt in 1 2 3; do
            echo "Upload attempt ${attempt}..."
            if twine upload --verbose dist/*; then
              echo "Upload succeeded"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Upload failed after 3 attempts"
              exit 1
            fi
            echo "Upload failed, retrying in 15s..."
            sleep 15
          done

      - name: Dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          twine check dist/*
          echo ""
          echo "Dry run complete. Would publish:"
          ls -lh dist/

      - name: Update beta version variable
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BETA="${{ needs.resolve-version.outputs.beta }}"
          NEXT=$(( BETA + 1 ))
          gh variable set PYPI_BETA_VERSION --body "$NEXT"
          echo "Set PYPI_BETA_VERSION to ${NEXT}"
