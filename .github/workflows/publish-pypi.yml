name: Publish to PyPI

permissions:
  contents: read

concurrency:
  group: publish-pypi
  cancel-in-progress: false

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to build from (default: current branch)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  verify-ci:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to pass on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          CHECKS="lint rust-tests integration-tests"
          MAX_WAIT=1200  # 20 minutes
          INTERVAL=30
          ELAPSED=0

          echo "Waiting for CI checks on ${SHA}..."
          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            ALL_DONE=true
            FAILED=false
            for CHECK in $CHECKS; do
              CONCLUSION=$(gh api "repos/${REPO}/commits/${SHA}/check-runs?check_name=${CHECK}" \
                --jq '.check_runs[0].conclusion // empty')
              if [ -z "$CONCLUSION" ]; then
                ALL_DONE=false
              elif [ "$CONCLUSION" != "success" ]; then
                echo "::error::CI check '${CHECK}' failed with '${CONCLUSION}' on ${SHA}."
                FAILED=true
              fi
            done

            if [ "$FAILED" = true ]; then exit 1; fi
            if [ "$ALL_DONE" = true ]; then
              echo "All CI checks passed on ${SHA}"
              exit 0
            fi

            echo "  CI still running... (${ELAPSED}s elapsed, checking again in ${INTERVAL}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::CI did not complete within ${MAX_WAIT}s on ${SHA}."
          exit 1

  resolve-version:
    needs: [verify-ci]
    if: ${{ always() && (needs.verify-ci.result == 'success' || needs.verify-ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      beta: ${{ steps.resolve.outputs.beta }}
      stable: ${{ steps.resolve.outputs.stable }}
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Resolve version
        id: resolve
        run: |
          # PyPI version is independent of the git release tag
          if [ -n "${{ vars.PYPI_VERSION }}" ]; then
            VERSION="${{ vars.PYPI_VERSION }}"
            IS_STABLE=true
          else
            BETA="${{ vars.PYPI_BETA_VERSION }}"
            if [ -z "$BETA" ]; then
              echo "::error::Neither PYPI_VERSION nor PYPI_BETA_VERSION is set"
              exit 1
            fi
            while pip index versions asherah 2>/dev/null | grep -q "0.5.0b${BETA}"; do
              echo "asherah==0.5.0b${BETA} already exists on PyPI, trying next..."
              BETA=$(( BETA + 1 ))
            done
            VERSION="0.5.0b${BETA}"
            IS_STABLE=false
            echo "beta=${BETA}" >> "$GITHUB_OUTPUT"
          fi

          echo "Will publish version: ${VERSION} (stable=${IS_STABLE})"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "stable=${IS_STABLE}" >> "$GITHUB_OUTPUT"

  build-wheels:
    needs: resolve-version
    # `resolve-version` uses `if: always()` to survive verify-ci being
    # skipped under workflow_dispatch; without an explicit always() here
    # the implicit `success()` check walks back to the skipped verify-ci
    # and skips this job too.
    if: ${{ always() && needs.resolve-version.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — manylinux_2_28 (glibc 2.28, RHEL 8+/Ubuntu 20.04+)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          # Linux ARM64 — cross-compiled
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          # Linux musl x86_64 (Alpine)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          # Linux musl ARM64 (Alpine)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          # macOS universal2 (x86_64 + ARM64 fat binary)
          - os: macos-latest
            target: universal2-apple-darwin
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@32a995a99d743b9c19db6838def362cd715afeb6 # 1.91.1
        with:
          targets: ${{ matrix.rust_targets || matrix.target }}

      - name: Set version
        shell: bash
        env:
          PYPI_VERSION: ${{ needs.resolve-version.outputs.version }}
          PYPI_STABLE: ${{ needs.resolve-version.outputs.stable }}
          PYPI_BETA: ${{ needs.resolve-version.outputs.beta }}
        run: bash scripts/set-pypi-version.sh

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *aarch64* ]]; then
            VCPKG_TRIPLET="arm64-windows-static-md"
          else
            VCPKG_TRIPLET="x64-windows-static-md"
          fi
          vcpkg install "openssl:${VCPKG_TRIPLET}"
          echo "OPENSSL_DIR=C:/vcpkg/installed/${VCPKG_TRIPLET}" >> "$GITHUB_ENV"
          echo "OPENSSL_STATIC=1" >> "$GITHUB_ENV"
          echo "OPENSSL_NO_VENDOR=1" >> "$GITHUB_ENV"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          rust-toolchain: "1.91.1"
          before-script-linux: source scripts/maturin-before-script-linux.sh
          args: >-
            --release
            --manifest-path asherah-py/Cargo.toml
            --out dist/

      - name: Remove non-abi3 wheels
        shell: bash
        run: |
          # generate-import-lib causes maturin to also build for free-threaded
          # Python interpreters on the runner. Only keep the abi3 wheel.
          for f in dist/*.whl; do
            case "$f" in
              *abi3*) echo "keep: $f" ;;
              *) echo "remove: $f"; rm -f "$f" ;;
            esac
          done

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1

  build-sdist:
    needs: resolve-version
    if: ${{ always() && needs.resolve-version.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set version
        env:
          PYPI_VERSION: ${{ needs.resolve-version.outputs.version }}
          PYPI_STABLE: ${{ needs.resolve-version.outputs.stable }}
          PYPI_BETA: ${{ needs.resolve-version.outputs.beta }}
        run: bash scripts/set-pypi-version.sh

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --manifest-path asherah-py/Cargo.toml --out dist/

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [resolve-version, build-wheels, build-sdist]
    if: ${{ always() && needs.resolve-version.result == 'success' && needs.build-wheels.result == 'success' && needs.build-sdist.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdist
          path: dist/

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install twine
        run: pip install twine

      - name: List packages
        run: ls -lh dist/

      - name: Publish to PyPI
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine check dist/*
          for attempt in 1 2 3; do
            echo "Upload attempt ${attempt}..."
            if twine upload --verbose dist/*; then
              echo "Upload succeeded"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Upload failed after 3 attempts"
              exit 1
            fi
            echo "Upload failed, retrying in 15s..."
            sleep 15
          done

      - name: Dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          twine check dist/*
          echo ""
          echo "Dry run complete. Would publish:"
          ls -lh dist/

      - name: Update version variable
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PYPI_VERSION: ${{ needs.resolve-version.outputs.version }}
          PYPI_STABLE: ${{ needs.resolve-version.outputs.stable }}
        run: |
          if [ "$PYPI_STABLE" = "true" ]; then
            MAJOR=$(echo "$PYPI_VERSION" | cut -d. -f1)
            MINOR=$(echo "$PYPI_VERSION" | cut -d. -f2)
            PATCH=$(echo "$PYPI_VERSION" | cut -d. -f3)
            NEXT_PATCH=$(( PATCH + 1 ))
            gh variable set PYPI_VERSION --body "${MAJOR}.${MINOR}.${NEXT_PATCH}"
            echo "Set PYPI_VERSION to ${MAJOR}.${MINOR}.${NEXT_PATCH}"
          else
            BETA="${{ needs.resolve-version.outputs.beta }}"
            NEXT=$(( BETA + 1 ))
            gh variable set PYPI_BETA_VERSION --body "$NEXT"
            echo "Set PYPI_BETA_VERSION to ${NEXT}"
          fi
