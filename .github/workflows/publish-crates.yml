name: Publish to crates.io

permissions:
  contents: read

concurrency:
  group: publish-crates
  cancel-in-progress: false

# Auto-publish on merge to main: a version bump to any crate's Cargo.toml lands
# on main and this workflow publishes the new version(s). It is idempotent —
# every crate whose current version is already on crates.io is skipped — so it
# is safe to run on any push (a code-only change with no bump publishes nothing).
# `release: published` and a manual `workflow_dispatch` (with an optional
# dry-run) remain as alternative triggers.
on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '.github/workflows/publish-crates.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (cargo publish --dry-run, do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Only the manual dispatch path can request a dry run; push/release always
      # publish for real.
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        # Respect rust-toolchain.toml (channel 1.91.1). `rustup show` in the
        # repo root activates and installs the pinned toolchain.
        run: rustup show

      # Publish the workspace crates IN DEPENDENCY ORDER, skipping any whose
      # current version is already on crates.io. A crate must be published after
      # every workspace crate it depends on, because crates.io verifies each
      # upload against the published versions of its path/version dependencies.
      #
      # Dependency edges (from each crate's [dependencies] in its Cargo.toml):
      #   asherah         -> (no internal workspace deps)
      #   asherah-config  -> asherah
      #   asherah-cobhan  -> asherah, asherah-config
      #   asherah-ffi     -> asherah, asherah-cobhan, asherah-config
      #
      # Resulting topological order:
      #   1. asherah  2. asherah-config  3. asherah-cobhan  4. asherah-ffi
      #
      # The `sleep 30` after a real publish lets the crates.io sparse index
      # update so the next dependent crate can resolve the freshly published
      # version. (Do NOT add --no-verify.)
      - name: Publish workspace crates (idempotent, dependency order)
        run: |
          set -euo pipefail

          # Publish "$1" (crate name == directory name == crates.io name) only if
          # its current Cargo.toml version is not already on crates.io.
          publish_if_new() {
            local crate="$1"
            local ver
            ver="$(grep -m1 '^version = ' "${crate}/Cargo.toml" | sed -E 's/^version = "(.+)"$/\1/')"
            if [ -z "${ver}" ]; then
              echo "::error::could not determine version for ${crate}"
              exit 1
            fi

            # crates.io requires a User-Agent; 200 = published, 404 = absent.
            # No -f: a 404 must return the code (200=published, 404=absent),
            # not make curl exit non-zero. cargo publish is the ultimate guard
            # against an accidental overwrite if this check is ever wrong.
            local code
            code="$(curl -sS -A 'asherah-ffi crates.io publish workflow' \
              -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/${crate}/${ver}" || true)"

            if [ "${code}" = "200" ]; then
              echo "::notice::${crate} ${ver} already on crates.io — skipping"
              return 0
            fi

            if [ "${DRY_RUN}" = "true" ]; then
              echo ">>> [dry-run] ${crate} ${ver}"
              cargo publish --dry-run -p "${crate}"
              return 0
            fi

            echo ">>> publishing ${crate} ${ver}"
            # retry.sh absorbs transient crates.io/network flakes; if a retry
            # races a partial success, "already uploaded" is treated as success.
            RETRY_SUCCESS_REGEX="already uploaded|already exists" \
              bash "$GITHUB_WORKSPACE/scripts/retry.sh" 3 20 -- \
              cargo publish -p "${crate}" --token "${CARGO_REGISTRY_TOKEN}"
            sleep 30
          }

          publish_if_new asherah
          publish_if_new asherah-config
          publish_if_new asherah-cobhan
          publish_if_new asherah-ffi
