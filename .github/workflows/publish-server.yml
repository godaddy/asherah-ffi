name: Publish Asherah Server

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.0). Leave empty to use current commit.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/asherah-server

jobs:
  verify-ci:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Checking CI status for commit ${SHA}..."
          FAILED=0
          for CHECK in lint rust-tests integration-tests; do
            CONCLUSION=$(gh api "repos/${REPO}/commits/${SHA}/check-runs?check_name=${CHECK}" \
              --jq '.check_runs[0].conclusion // empty')
            echo "  ${CHECK}: ${CONCLUSION:-not found}"
            if [ -z "$CONCLUSION" ]; then
              echo "::error::CI check '${CHECK}' not found on ${SHA}. Wait for CI to finish."
              FAILED=1
            elif [ "$CONCLUSION" != "success" ]; then
              echo "::error::CI check '${CHECK}' concluded '${CONCLUSION}' on ${SHA}."
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then exit 1; fi
          echo "All CI checks passed on ${SHA}"

  build-and-push:
    needs: [verify-ci]
    if: ${{ always() && (needs.verify-ci.result == 'success' || needs.verify-ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="sha-$(git rev-parse --short HEAD)"
          fi
          # Strip leading 'v' for semver tags
          SEMVER="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: asherah-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.semver }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=asherah-server
          cache-to: type=gha,mode=max,scope=asherah-server
          labels: |
            org.opencontainers.image.title=asherah-server
            org.opencontainers.image.description=gRPC sidecar server for Asherah envelope encryption
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.semver }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Show image details
        run: |
          echo "=============================================="
          echo "asherah-server container image published"
          echo "=============================================="
          echo ""
          echo "Pull with:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          echo ""
          echo "Run with:"
          echo "  docker run --rm -v /tmp:/tmp ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} \\"
          echo "    --service my-service --product my-product --kms static --metastore memory"
          echo ""
          echo "Platforms: linux/amd64, linux/arm64"
          echo "=============================================="
