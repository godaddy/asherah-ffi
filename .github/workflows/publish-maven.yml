name: Publish Java Packages (Maven)

# Top-level read-only token; jobs that need to push packages escalate
# the relevant scopes (`packages: write`, etc.) explicitly. Without
# this, a misconfigured or compromised step would inherit the
# repository-level default, which can be broader than necessary.
permissions:
  contents: read

concurrency:
  group: publish-maven
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["Release Asherah Native Library"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string
      publish_target:
        description: 'Where to publish'
        required: false
        default: github
        type: choice
        options:
          - github
          - central
          - both
      central_auto_publish:
        description: 'Auto-publish validated deployment on Maven Central'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    # See note in publish-nuget.yml: only auto-fire when the upstream
    # release-cobhan run was triggered by a release event. Reruns via
    # workflow_dispatch would otherwise re-publish "latest release"
    # under a fresh Maven coordinate.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Validate Maven Central secrets
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' && (github.event.inputs.publish_target == 'central' || github.event.inputs.publish_target == 'both')) }}
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        run: |
          if [ -z "${CENTRAL_TOKEN_USERNAME}" ] || [ -z "${CENTRAL_TOKEN_PASSWORD}" ]; then
            echo "ERROR: Missing CENTRAL_TOKEN_USERNAME or CENTRAL_TOKEN_PASSWORD secret"
            exit 1
          fi

      - name: Download native libraries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Use the upstream tag only when the triggering workflow_run was
          # a release event. For workflow_dispatch upstreams, head_branch
          # is the dispatched ref (e.g. "main") — fall back to latest.
          if [ "$WORKFLOW_RUN_EVENT" = "release" ] && [ -n "$WORKFLOW_RUN_BRANCH" ]; then
            TAG="$WORKFLOW_RUN_BRANCH"
          else
            TAG="$(gh release list --limit 1 --json tagName -q '.[0].tagName')"
          fi
          echo "Downloading Java JNI native libs from release ${TAG}"

          NATIVE_DIR=asherah-java/java/src/main/resources/native
          mkdir -p /tmp/native-dl
          mkdir -p "$NATIVE_DIR"/{linux-x86_64,linux-aarch64,linux-musl-x86_64,linux-musl-aarch64,darwin-x86_64,darwin-aarch64,windows-x86_64,windows-aarch64}

          # Download Java JNI libraries (libasherah_java-<arch>.*)
          gh release download "$TAG" -p 'libasherah_java-x64.so'           -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah_java-arm64.so'         -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah_java-x64-musl.so'      -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah_java-arm64-musl.so'    -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah_java-x64.dylib'        -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah_java-arm64.dylib'      -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah_java-x64.dll'          -D /tmp/native-dl || true
          gh release download "$TAG" -p 'libasherah_java-arm64.dll'        -D /tmp/native-dl || true

          # Stage into JAR resource directories
          cp /tmp/native-dl/libasherah_java-x64.so          "$NATIVE_DIR/linux-x86_64/libasherah_java.so"
          cp /tmp/native-dl/libasherah_java-arm64.so        "$NATIVE_DIR/linux-aarch64/libasherah_java.so"
          cp /tmp/native-dl/libasherah_java-x64-musl.so     "$NATIVE_DIR/linux-musl-x86_64/libasherah_java.so"
          cp /tmp/native-dl/libasherah_java-arm64-musl.so   "$NATIVE_DIR/linux-musl-aarch64/libasherah_java.so"
          cp /tmp/native-dl/libasherah_java-x64.dylib       "$NATIVE_DIR/darwin-x86_64/libasherah_java.dylib"
          cp /tmp/native-dl/libasherah_java-arm64.dylib     "$NATIVE_DIR/darwin-aarch64/libasherah_java.dylib"
          [ -f /tmp/native-dl/libasherah_java-x64.dll ]  && cp /tmp/native-dl/libasherah_java-x64.dll   "$NATIVE_DIR/windows-x86_64/asherah_java.dll"
          [ -f /tmp/native-dl/libasherah_java-arm64.dll ] && cp /tmp/native-dl/libasherah_java-arm64.dll "$NATIVE_DIR/windows-aarch64/asherah_java.dll"

          echo "Native libraries staged:"
          find "$NATIVE_DIR" -type f -not -name '.git*' | sort

      - name: Set version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            # Keep the Java artifact on the 0.50.x track, monotonically increasing
            # from the latest version already published to GitHub Packages.
            #
            # The previous scheme derived the patch from the git tag ("0.50.<tag
            # patch>"), which collided once the repo moved off the v0.5.x tag line:
            # v1.0.0 -> patch 0 -> 0.50.0, which already existed (409 Conflict).
            # Deriving from the published metadata is tag-independent and never
            # collides.
            META="$(curl -sSf -u "x:${GH_TOKEN}" \
              "https://maven.pkg.github.com/${GITHUB_REPOSITORY}/com/godaddy/asherah/encryption/appencryption/maven-metadata.xml" || true)"
            LATEST="$(printf '%s' "$META" | grep -oE '0\.50\.[0-9]+' | sort -V | tail -1)"
            if [ -z "$LATEST" ]; then
              echo "ERROR: could not determine the latest published 0.50.x version from GitHub Packages metadata"
              exit 1
            fi
            VERSION="0.50.$(( ${LATEST##*.} + 1 ))"
          fi
          echo "Publishing version: ${VERSION}"
          mvn -B -f asherah-java/java/pom.xml versions:set -DnewVersion="${VERSION}"
          echo "MAVEN_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build JAR with native libraries
        run: |
          mvn -B -f asherah-java/java/pom.xml \
            -Dnative.build.skip=true \
            -DskipTests \
            package

      - name: Verify native libraries in JAR
        run: |
          JAR=$(find asherah-java/java/target -name 'appencryption-*.jar' -not -name '*sources*' -not -name '*javadoc*' | head -1)
          echo "=== Native libs in $JAR ==="
          jar tf "$JAR" | grep native/ | sort
          COUNT=$(jar tf "$JAR" | grep -c "native/.*\.\(so\|dylib\|dll\)$" || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No native libraries found in JAR"
            exit 1
          fi
          echo "$COUNT native libraries bundled"

      - name: Deploy to GitHub Packages
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' && (github.event.inputs.publish_target == 'github' || github.event.inputs.publish_target == 'both')) }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B -f asherah-java/java/pom.xml \
            -Dnative.build.skip=true \
            -DskipTests \
            deploy

      - name: Import GPG key for Maven Central
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' && (github.event.inputs.publish_target == 'central' || github.event.inputs.publish_target == 'both')) }}
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${MAVEN_GPG_PRIVATE_KEY}" ]; then
            echo "ERROR: Missing MAVEN_GPG_PRIVATE_KEY secret"
            exit 1
          fi
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "${MAVEN_GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Publish GPG public key to keyservers
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' && (github.event.inputs.publish_target == 'central' || github.event.inputs.publish_target == 'both')) }}
        run: |
          set -euo pipefail

          KEY_FINGERPRINT="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ -z "${KEY_FINGERPRINT}" ]; then
            echo "ERROR: Unable to determine imported GPG key fingerprint"
            exit 1
          fi

          echo "Using GPG key fingerprint: ${KEY_FINGERPRINT}"
          SENT=0
          for KEYSERVER_URI in \
            hkp://keyserver.ubuntu.com:80 \
            hkps://keyserver.ubuntu.com \
            hkps://keys.openpgp.org \
            hkp://pgp.mit.edu:11371; do
            echo "Sending public key to ${KEYSERVER_URI}"
            if timeout 30s gpg --batch --keyserver "${KEYSERVER_URI}" --send-keys "${KEY_FINGERPRINT}"; then
              SENT=1
            else
              echo "WARN: Failed to send key to ${KEYSERVER_URI}; continuing"
            fi
          done

          if [ "${SENT}" -ne 1 ]; then
            echo "ERROR: Unable to publish GPG public key to any supported keyserver"
            exit 1
          fi

          # Verify discoverability from a fresh keyring to avoid local cache false positives.
          VERIFIED=0
          for ATTEMPT in 1 2 3 4 5; do
            TMP_GNUPGHOME="$(mktemp -d)"
            chmod 700 "${TMP_GNUPGHOME}"
            if GNUPGHOME="${TMP_GNUPGHOME}" timeout 20s gpg --batch --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys "${KEY_FINGERPRINT}"; then
              VERIFIED=1
              rm -rf "${TMP_GNUPGHOME}"
              break
            fi
            rm -rf "${TMP_GNUPGHOME}"
            echo "Key not yet visible on keyserver.ubuntu.com (attempt ${ATTEMPT}/5); waiting 20s..."
            sleep 20
          done

          if [ "${VERIFIED}" -ne 1 ]; then
            echo "ERROR: GPG key is not yet discoverable on keyserver.ubuntu.com"
            exit 1
          fi

      - name: Deploy to Maven Central
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' && (github.event.inputs.publish_target == 'central' || github.event.inputs.publish_target == 'both')) }}
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          if [ -z "${MAVEN_GPG_PASSPHRASE}" ]; then
            echo "ERROR: Missing MAVEN_GPG_PASSPHRASE secret"
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            CENTRAL_AUTO_PUBLISH=true
          else
            CENTRAL_AUTO_PUBLISH=${{ github.event.inputs.central_auto_publish }}
          fi
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${{ secrets.CENTRAL_TOKEN_USERNAME }}</username>
                <password>${{ secrets.CENTRAL_TOKEN_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF
          # retry.sh absorbs transient Maven Central / network flakes.
          bash "$GITHUB_WORKSPACE/scripts/retry.sh" 3 20 -- \
            mvn -B -f asherah-java/java/pom.xml \
            -Pcentral \
            -Dnative.build.skip=true \
            -DskipTests \
            -Dgpg.passphrase="${MAVEN_GPG_PASSPHRASE}" \
            -Dcentral.autoPublish="${CENTRAL_AUTO_PUBLISH}" \
            deploy

      - name: Dry run
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run complete. Would publish:"
          ls -lh asherah-java/java/target/*.jar
          echo ""
          echo "Package: com.godaddy.asherah.encryption:appencryption:${MAVEN_VERSION}"
          echo "Target: ${{ github.event.inputs.publish_target }}"
