name: Publish to GitHub Packages (Maven)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0-beta.1)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "Publishing version: ${VERSION}"
          mvn -B -f asherah-java/java/pom.xml versions:set -DnewVersion="${VERSION}"
          echo "MAVEN_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build JAR (skip native build and tests)
        run: |
          mvn -B -f asherah-java/java/pom.xml \
            -Dnative.build.skip=true \
            -DskipTests \
            package

      - name: List packages
        run: ls -lh asherah-java/java/target/*.jar

      - name: Deploy to GitHub Packages
        if: ${{ github.event_name == 'release' || github.event.inputs.dry_run != 'true' }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B -f asherah-java/java/pom.xml \
            -Dnative.build.skip=true \
            -DskipTests \
            deploy

      - name: Dry run
        if: ${{ github.event_name != 'release' && github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run complete. Would publish:"
          ls -lh asherah-java/java/target/*.jar
          echo ""
          echo "Package: com.godaddy.asherah:asherah-java:${MAVEN_VERSION}"
