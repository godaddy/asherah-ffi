name: Publish PHP Composer Package

permissions:
  contents: read

concurrency:
  group: publish-php
  cancel-in-progress: false

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag/ref to package (default: current ref)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  package-and-publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref }}
      - name: Validate publish target
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' && github.event.inputs.tag == '' }}
        run: |
          echo "::error::Manual non-dry-run PHP publication requires a release tag input."
          exit 1
      - name: Resolve release tag
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            RELEASE_TAG="$INPUT_TAG"
          elif [ -n "$RELEASE_EVENT_TAG" ]; then
            RELEASE_TAG="$RELEASE_EVENT_TAG"
          else
            echo "::error::Unable to determine release tag for PHP publication."
            exit 1
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "Publishing PHP archive for ${RELEASE_TAG}"
      - name: Wait for native release assets
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          required_assets=(
            libasherah-x64.so \
            libasherah-arm64.so \
            libasherah-x64-musl.so \
            libasherah-arm64-musl.so \
            libasherah-x64.dylib \
            libasherah-arm64.dylib \
            libasherah-x64.dll \
            libasherah-arm64.dll \
            SHA256SUMS
          )

          for attempt in $(seq 1 60); do
            mapfile -t assets < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
            missing=()
            for asset in "${required_assets[@]}"; do
              if ! printf '%s\n' "${assets[@]}" | grep -Fxq "$asset"; then
                missing+=("$asset")
              fi
            done

            if [ "${#missing[@]}" -eq 0 ]; then
              echo "All required native assets are present for ${RELEASE_TAG}."
              exit 0
            fi

            echo "Waiting for native assets on ${RELEASE_TAG} (attempt ${attempt}/60): ${missing[*]}"
            sleep 60
          done

          echo "::error::Timed out waiting for native assets on ${RELEASE_TAG}."
          exit 1
      - name: Build PHP package image
        run: docker build -t asherah-php-publish -f asherah-php/.Dockerfile.debian asherah-php
      - name: Build source-only Composer archive
        run: |
          docker run --rm -v "$PWD":/work -w /work/asherah-php asherah-php-publish sh -lc '
            set -e
            ARCHIVE="$(/work/scripts/build-php-source-archive.sh /tmp/asherah-php-dist | tail -n 1)"
            test ! -e /work/asherah-php/composer.lock
            test ! -d /work/asherah-php/vendor
            test ! -d /work/asherah-php/native
            cp "$ARCHIVE" /work/asherah-php-source.zip
          '
      - name: Upload dry-run artifact
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asherah-php-source
          path: asherah-php-source.zip
      - name: Attach source archive to GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.dry_run != 'true' && github.event.inputs.tag != '') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash "$GITHUB_WORKSPACE/scripts/retry.sh" 3 10 -- gh release upload "$RELEASE_TAG" asherah-php-source.zip --clobber
