name: Benchmark Setup

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      bench_mode:
        required: true
        type: string
        description: "Benchmark mode: memory, hot, warm, or cold"

jobs:
  benchmark:
    runs-on: ubuntu-22.04
    services:
      mysql:
        image: mysql:8.1
        env:
          MYSQL_DATABASE: test
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.23'

      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1
        with:
          ruby-version: '3.3'

      - name: Install Ruby gems
        run: gem install ffi benchmark-ips kalibera asherah --no-document

      - name: Build and install Python binding
        run: |
          pip install maturin
          maturin build --release --manifest-path asherah-py/Cargo.toml --out dist/
          pip install dist/*.whl

      - name: Install Node.js dependencies
        run: |
          cd benchmarks/asherah-node-bench && npm install
          cd ../node-bench-canonical && npm install

      - name: Build Rust FFI library
        run: cargo build --release -p asherah-ffi

      - name: Build Java JNI library
        run: cargo build --release -p asherah-java

      - name: Build Java FFI JAR
        run: |
          mvn -B -f asherah-java/java/pom.xml -Dnative.build.skip=true -DskipTests package -q
          JAR_FILE=$(ls asherah-java/java/target/appencryption-*.jar | grep -v sources | grep -v javadoc | head -1)
          JAR_VERSION=$(echo "$JAR_FILE" | sed 's/.*appencryption-\(.*\)\.jar/\1/')
          mvn -B install:install-file -Dfile="$JAR_FILE" \
            -DgroupId=com.godaddy.asherah -DartifactId=appencryption \
            -Dversion="${JAR_VERSION}" -Dpackaging=jar -q

      - name: Clone canonical asherah repo
        run: git clone --depth 1 https://github.com/godaddy/asherah.git /tmp/asherah-canonical

      - name: Build canonical Java
        run: mvn -B -f /tmp/asherah-canonical/java/app-encryption/pom.xml install -DskipTests -q

      - name: Build Node.js addon
        run: |
          cd asherah-node
          npm install
          npx @napi-rs/cli build --release --platform linux-x64-gnu --target x86_64-unknown-linux-gnu
          mkdir -p npm/linux-x64-gnu
          NODE_FILE=$(find . target -maxdepth 4 -name '*.node' -newer package.json 2>/dev/null | head -1)
          if [ -n "$NODE_FILE" ]; then
            cp "$NODE_FILE" npm/linux-x64-gnu/index.linux-x64-gnu.node
          else
            echo "WARNING: No .node file found after napi build"
            find . -name '*.node' 2>/dev/null
          fi

      - name: Tidy Go modules
        run: cd benchmarks/go-bench && go mod tidy

      - name: Create MySQL schema
        if: inputs.bench_mode != 'memory'
        run: |
          mysql -h 127.0.0.1 -u root test -e \
            "CREATE TABLE IF NOT EXISTS encryption_key (
              id VARCHAR(255) NOT NULL,
              created TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
              key_record JSON NOT NULL,
              PRIMARY KEY(id, created),
              INDEX(created)
            ) ENGINE=InnoDB"

      - name: Run benchmarks
        env:
          BENCH_MODE: ${{ inputs.bench_mode }}
          BENCH_MYSQL_URL: ${{ inputs.bench_mode != 'memory' && 'mysql://root@127.0.0.1:3306/test' || '' }}
          STATIC_MASTER_KEY_HEX: "746869734973415374617469634d61737465724b6579466f7254657374696e67"
          ASHERAH_DOTNET_NATIVE: ${{ github.workspace }}/target/release
          ASHERAH_RUBY_NATIVE: ${{ github.workspace }}/target/release
          ASHERAH_GO_NATIVE: ${{ github.workspace }}/target/release
        run: scripts/benchmark.sh --${{ inputs.bench_mode }}
