name: Publish to RubyGems

permissions:
  contents: read

concurrency:
  group: publish-rubygems
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["Release Asherah Native Library"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  package-and-publish:
    # See note in publish-nuget.yml: only auto-fire when the upstream
    # release-cobhan run was triggered by a release event. Reruns via
    # workflow_dispatch would otherwise re-publish "latest release"
    # under a fresh gem version.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1
        with:
          ruby-version: '3.3'

      - name: Verify RubyGems credentials (read-only)
        env:
          RUBYGEMS_TOKEN: ${{ secrets.RUBYGEMS_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${RUBYGEMS_TOKEN:-}" ]; then
            echo "ERROR: RUBYGEMS_TOKEN secret is empty/unset." >&2
            exit 1
          fi
          # Read-only auth probe. This does NOT publish anything.
          # 200 = key authenticates. 401 = bad/invalid key -> hard fail.
          # 403/other = key is valid but lacks read scope for this endpoint
          # (e.g. a push-only key) -> warn only, never block a real release.
          code=$(curl -sS -o /tmp/rg_me.json -w '%{http_code}' \
            -H "Authorization: ${RUBYGEMS_TOKEN}" \
            https://rubygems.org/api/v1/profile/me.json || echo "000")
          echo "profile/me.json -> HTTP ${code}"
          case "$code" in
            200)
              handle=$(ruby -rjson -e 'puts(JSON.parse(File.read("/tmp/rg_me.json"))["handle"] || "?")' 2>/dev/null || echo "?")
              echo "RubyGems token authenticates as: ${handle}"
              ;;
            401)
              echo "ERROR: RubyGems rejected the token (401). RUBYGEMS_TOKEN is not a valid API key." >&2
              exit 1
              ;;
            *)
              echo "WARNING: profile probe returned ${code} (not 401). The key likely authenticates"
              echo "but lacks read scope for this endpoint; push scope/MFA are only proven by an"
              echo "actual 'gem push'. Continuing."
              ;;
          esac
          echo "NOTE: a 200 here confirms the key is valid; it does NOT by itself prove push"
          echo "scope or MFA-on-push. Those are exercised only by the real 'gem push' step."

      - name: Download native libraries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Use the upstream tag only when the triggering workflow_run was
          # a release event. For workflow_dispatch upstreams, head_branch
          # is the dispatched ref (e.g. "main") — fall back to latest.
          if [ "$WORKFLOW_RUN_EVENT" = "release" ] && [ -n "$WORKFLOW_RUN_BRANCH" ]; then
            TAG="$WORKFLOW_RUN_BRANCH"
          else
            TAG="$(gh release list --limit 1 --json tagName -q '.[0].tagName')"
          fi
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "Downloading native libs from release ${TAG}"

          mkdir -p /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-x64.so'           -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-arm64.so'         -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-x64-musl.so'      -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-arm64-musl.so'    -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-x64.dylib'        -D /tmp/native-dl
          gh release download "$TAG" -p 'libasherah-arm64.dylib'      -D /tmp/native-dl

          # Stage for gem packaging (rename to libasherah_ffi.*)
          mkdir -p /tmp/staged/{x86_64-linux,aarch64-linux,x86_64-linux-musl,aarch64-linux-musl,x86_64-darwin,arm64-darwin}
          cp /tmp/native-dl/libasherah-x64.so          /tmp/staged/x86_64-linux/libasherah_ffi.so
          cp /tmp/native-dl/libasherah-arm64.so        /tmp/staged/aarch64-linux/libasherah_ffi.so
          cp /tmp/native-dl/libasherah-x64-musl.so     /tmp/staged/x86_64-linux-musl/libasherah_ffi.so
          cp /tmp/native-dl/libasherah-arm64-musl.so   /tmp/staged/aarch64-linux-musl/libasherah_ffi.so
          cp /tmp/native-dl/libasherah-x64.dylib       /tmp/staged/x86_64-darwin/libasherah_ffi.dylib
          cp /tmp/native-dl/libasherah-arm64.dylib     /tmp/staged/arm64-darwin/libasherah_ffi.dylib

      - name: Set version
        working-directory: asherah-ruby
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RUBYGEMS_VERSION: ${{ vars.RUBYGEMS_VERSION }}
        run: |
          set -euo pipefail
          # The RubyGems gem version is tracked INDEPENDENTLY of the monorepo
          # release tag via the RUBYGEMS_VERSION repository variable (currently
          # the 0.10.x line). We deliberately do NOT fall back to the monorepo
          # tag: publishing a monorepo version (e.g. 0.6.x) to RubyGems.org
          # would be a wrong, irreversible release. Fail loudly instead.
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            VERSION_SOURCE="input"
          elif [ -n "$RUBYGEMS_VERSION" ]; then
            VERSION="$RUBYGEMS_VERSION"
            VERSION_SOURCE="variable"
          else
            echo "ERROR: No gem version available." >&2
            echo "Set the RUBYGEMS_VERSION repository variable, or pass the 'version'" >&2
            echo "input for a workflow_dispatch run. Refusing to fall back to the monorepo" >&2
            echo "release tag (that would publish a wrong, irreversible version to RubyGems.org)." >&2
            exit 1
          fi
          # Guard against garbage (e.g. a stray tag or empty value) reaching
          # `gem push` or the patch-increment arithmetic below.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: VERSION '$VERSION' is not a X.Y.Z release version" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION_SOURCE=${VERSION_SOURCE}" >> "$GITHUB_ENV"
          echo "Publishing version: ${VERSION} (source: ${VERSION_SOURCE})"
          cat > lib/asherah/version.rb <<RUBY
          # frozen_string_literal: true

          module Asherah
            VERSION = "${VERSION}"
          end
          RUBY

      - name: Build platform gems
        working-directory: asherah-ruby
        run: |
          mkdir -p pkg

          for platform in x86_64-linux aarch64-linux x86_64-linux-musl aarch64-linux-musl x86_64-darwin arm64-darwin; do
            lib=$(find "/tmp/staged/$platform" -name 'libasherah_ffi.*' | head -1)
            if [ -z "$lib" ]; then
              echo "WARNING: No library for $platform"
              continue
            fi

            echo "=== Building gem for $platform ==="
            mkdir -p lib/asherah/native
            cp "$lib" lib/asherah/native/
            ASHERAH_GEM_PLATFORM="$platform" gem build asherah.gemspec && mv *.gem pkg/
            rm -f lib/asherah/native/libasherah_ffi.* lib/asherah/native/asherah_ffi.*
          done

          # Build fallback ruby-platform gem (no binary — downloads at install time)
          echo "=== Building fallback (ruby platform) gem ==="
          rm -rf lib/asherah/native
          # Stamp NATIVE_VERSION so fetch_native.rb downloads the matching release
          echo "${RELEASE_TAG}" > NATIVE_VERSION
          gem build asherah.gemspec && mv *.gem pkg/
          rm -f NATIVE_VERSION
          mkdir -p lib/asherah/native

          echo ""
          echo "=== Built gems ==="
          ls -lh pkg/

      - name: Publish gems
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true') }}
        working-directory: asherah-ruby
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_TOKEN }}
        run: |
          set -uo pipefail
          for gem in pkg/*.gem; do
            echo "Publishing $gem..."
            push_output="$(gem push "$gem" 2>&1)" && rc=0 || rc=$?
            printf '%s\n' "$push_output"
            if [ "$rc" -eq 0 ]; then
              continue
            fi
            # Idempotent rerun: a version already on RubyGems.org cannot be
            # repushed. Tolerate that so a partial-failure rerun can finish the
            # remaining platform gems. Any OTHER failure (auth, MFA, network)
            # must abort the job so "Update version variable" does NOT run and
            # silently skip this version.
            if printf '%s' "$push_output" | grep -qiE 'already (been )?(pushed|exists)|Repushing of gem versions|same name and version'; then
              echo "NOTE: $gem already exists on RubyGems.org; treating as success."
              continue
            fi
            echo "ERROR: Failed to push $gem (rc=$rc) — aborting before version bump." >&2
            exit "$rc"
          done

      - name: Update version variable
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          # Only advance the counter when this publish was driven BY the
          # variable. An explicit workflow_dispatch 'version' input is a one-off
          # and must not move the tracked line.
          if [ "$VERSION_SOURCE" = "variable" ]; then
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT_PATCH=$(( PATCH + 1 ))
            gh variable set RUBYGEMS_VERSION --body "${MAJOR}.${MINOR}.${NEXT_PATCH}"
            echo "Set RUBYGEMS_VERSION to ${MAJOR}.${MINOR}.${NEXT_PATCH}"
          fi

      - name: Dry run summary
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        working-directory: asherah-ruby
        run: |
          echo "Dry run complete. Would publish:"
          for gem in pkg/*.gem; do
            echo "  $gem"
          done
