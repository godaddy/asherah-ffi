name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to build from (default: current branch)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  build-bindings:
    strategy:
      matrix:
        settings:
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            build: |
              set -e
              npm ci
              npm run build -- --target x86_64-unknown-linux-gnu
              strip -x *.node
          - host: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            build: |
              set -e
              echo 'Acquire::Retries "3";' | sudo tee /etc/apt/apt.conf.d/80-retries
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
              rustup target add aarch64-unknown-linux-gnu
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
              export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
              export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              npm ci
              npm run build -- --target aarch64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            build: |
              set -e
              rustup target add x86_64-apple-darwin
              npm ci
              npm run build -- --target x86_64-apple-darwin
              strip -x *.node
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              set -e
              sudo rm -Rf /Library/Developer/CommandLineTools/SDKs/*
              export CC=$(xcrun -f clang)
              export CXX=$(xcrun -f clang++)
              SYSROOT=$(xcrun --sdk macosx --show-sdk-path)
              export CFLAGS="-isysroot $SYSROOT -isystem $SYSROOT"
              npm ci
              npm run build -- --target aarch64-apple-darwin
              strip -x *.node
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: |
              set -e
              # Download x86_64 musl OpenSSL from Alpine (auto-discover latest version)
              ARCH=x86_64
              mkdir -p /tmp/musl-ssl && cd /tmp/musl-ssl
              OPENSSL_DEV=$(curl -sL "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/$ARCH/" | grep -o "openssl-dev-[^\"]*\\.apk" | head -1)
              OPENSSL_STATIC=$(curl -sL "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/$ARCH/" | grep -o "openssl-libs-static-[^\"]*\\.apk" | head -1)
              echo "Downloading $OPENSSL_DEV and $OPENSSL_STATIC"
              curl -sLO "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/$ARCH/$OPENSSL_DEV"
              curl -sLO "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/$ARCH/$OPENSSL_STATIC"
              for f in *.apk; do tar xf "$f" 2>/dev/null || true; done
              ls usr/include/openssl/ssl.h || { echo "ERROR: OpenSSL headers not found"; exit 1; }
              export OPENSSL_DIR=/tmp/musl-ssl/usr
              export OPENSSL_STATIC=1
              export OPENSSL_NO_VENDOR=1
              cd "$GITHUB_WORKSPACE/asherah-node"
              rustup target add x86_64-unknown-linux-musl
              npm ci
              npm run build -- --target x86_64-unknown-linux-musl --zig
              strip -x *.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: |
              set -e
              # Download aarch64 musl OpenSSL from Alpine (auto-discover latest version)
              ARCH=aarch64
              mkdir -p /tmp/musl-ssl && cd /tmp/musl-ssl
              OPENSSL_DEV=$(curl -sL "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/$ARCH/" | grep -o "openssl-dev-[^\"]*\\.apk" | head -1)
              OPENSSL_STATIC=$(curl -sL "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/$ARCH/" | grep -o "openssl-libs-static-[^\"]*\\.apk" | head -1)
              echo "Downloading $OPENSSL_DEV and $OPENSSL_STATIC"
              curl -sLO "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/$ARCH/$OPENSSL_DEV"
              curl -sLO "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/$ARCH/$OPENSSL_STATIC"
              for f in *.apk; do tar xf "$f" 2>/dev/null || true; done
              ls usr/include/openssl/ssl.h || { echo "ERROR: OpenSSL headers not found"; exit 1; }
              export OPENSSL_DIR=/tmp/musl-ssl/usr
              export OPENSSL_STATIC=1
              export OPENSSL_NO_VENDOR=1
              cd "$GITHUB_WORKSPACE/asherah-node"
              rustup target add aarch64-unknown-linux-musl
              npm ci
              npm run build -- --target aarch64-unknown-linux-musl --zig
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: |
              vcpkg install openssl:x64-windows-static-md
              export OPENSSL_DIR="C:/vcpkg/installed/x64-windows-static-md"
              export OPENSSL_NO_VENDOR=1
              npm ci
              npm run build -- --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: |
              vcpkg install openssl:arm64-windows-static-md
              export OPENSSL_DIR="C:/vcpkg/installed/arm64-windows-static-md"
              export OPENSSL_NO_VENDOR=1
              rustup target add aarch64-pc-windows-msvc
              npm ci
              npm run build -- --target aarch64-pc-windows-msvc

    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install Zig (musl builds)
        if: contains(matrix.settings.target, 'musl')
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2

      - name: Install cargo-zigbuild (musl builds)
        if: contains(matrix.settings.target, 'musl')
        uses: taiki-e/install-action@0d865d5cc6d507df4765f1f866bfae8bab4e2a73 # v2
        with:
          tool: cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Build
        working-directory: asherah-node
        shell: bash
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: asherah-node/*.node
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build-bindings
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: bindings-*

      - name: List downloaded artifacts
        run: |
          ls -R artifacts/

      - name: Resolve version
        working-directory: asherah-node
        run: |
          # NPM_VERSION is the PATCH number only. The major.minor is hardcoded.
          PATCH="${{ vars.NPM_VERSION }}"
          if [ -n "$PATCH" ]; then
            VERSION="4.0.${PATCH}"
            NPM_TAG="latest"
          else
            # Fallback to beta versioning
            BETA="${{ vars.NPM_BETA_VERSION }}"
            if [ -z "$BETA" ]; then
              echo "::error::NPM_VERSION (patch number) is not set"
              exit 1
            fi
            while npm view "asherah@4.0.0-beta.${BETA}" version 2>/dev/null; do
              echo "asherah@4.0.0-beta.${BETA} already exists, trying next..."
              BETA=$(( BETA + 1 ))
            done
            VERSION="4.0.0-beta.${BETA}"
            NPM_TAG="beta"
            echo "NPM_BETA=${BETA}" >> "$GITHUB_ENV"
          fi

          echo "Publishing version: ${VERSION} with tag: ${NPM_TAG}"
          npm version "$VERSION" --no-git-tag-version
          echo "NPM_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "NPM_TAG=${NPM_TAG}" >> "$GITHUB_ENV"

      - name: Place bindings and set platform versions
        working-directory: asherah-node
        shell: bash
        run: |
          npm ci --ignore-scripts

          # Map Rust triples to napi platform directory names
          declare -A TRIPLE_MAP=(
            [x86_64-unknown-linux-gnu]=linux-x64-gnu
            [aarch64-unknown-linux-gnu]=linux-arm64-gnu
            [x86_64-unknown-linux-musl]=linux-x64-musl
            [aarch64-unknown-linux-musl]=linux-arm64-musl
            [x86_64-apple-darwin]=darwin-x64
            [aarch64-apple-darwin]=darwin-arm64
            [x86_64-pc-windows-msvc]=win32-x64-msvc
            [aarch64-pc-windows-msvc]=win32-arm64-msvc
          )

          for triple in "${!TRIPLE_MAP[@]}"; do
            platform="${TRIPLE_MAP[$triple]}"
            src="../artifacts/bindings-${triple}"
            dst="npm/${platform}"
            mkdir -p "$dst"
            node_file=$(find "$src" -name "*.node" -print -quit 2>/dev/null)
            if [ -n "$node_file" ]; then
              cp -v "$node_file" "$dst/index.${platform}.node"
            else
              echo "::warning::No binding found for ${triple}"
            fi
          done

          echo "Bindings placed:"
          ls -lh npm/*/index.*.node

          # Update version in all platform package.json files and main optionalDependencies
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('$dir/package.json', 'utf8'));
                pkg.version = '${NPM_VERSION}';
                fs.writeFileSync('$dir/package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "Set $dir → ${NPM_VERSION}"
            fi
          done

          # Update optionalDependencies versions in main package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (pkg.optionalDependencies) {
              for (const dep of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[dep] = '${NPM_VERSION}';
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform packages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: asherah-node
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"/*.node 1>/dev/null 2>&1; then
              echo "Publishing $(node -p "require('./$dir/package.json').name")@${NPM_VERSION}..."
              (cd "$dir" && npm publish --access public)
            fi
          done

      - name: Publish to npm (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: asherah-node
        shell: bash
        run: |
          echo "=== Platform packages ==="
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"/*.node 1>/dev/null 2>&1; then
              echo "Would publish: $(node -p "require('./$dir/package.json').name")@${NPM_VERSION}"
              (cd "$dir" && npm pack && tar -tzf *.tgz)
            fi
          done
          echo ""
          echo "=== Main package ==="
          npm pack
          echo "Contents:"
          tar -tzf *.tgz
          echo "Dry run complete. Would publish version ${NPM_VERSION}."

      - name: Publish main package
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: asherah-node
        run: npm publish --access public --tag "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update version variable
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ "$NPM_TAG" = "beta" ] && [ -n "${NPM_BETA:-}" ]; then
            NEXT=$(( NPM_BETA + 1 ))
            gh variable set NPM_BETA_VERSION --body "$NEXT"
            echo "Set NPM_BETA_VERSION to ${NEXT}"
          elif [ "$NPM_TAG" = "latest" ]; then
            # NPM_VERSION is the patch number only — bump it
            PATCH=$(echo "$NPM_VERSION" | sed 's/^4\.0\.//')
            NEXT_PATCH=$(( PATCH + 1 ))
            gh variable set NPM_VERSION --body "$NEXT_PATCH"
            echo "Set NPM_VERSION to ${NEXT_PATCH} (next publish will be 4.0.${NEXT_PATCH})"
          fi
