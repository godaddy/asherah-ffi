name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to build from (default: current branch)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  build-bindings:
    strategy:
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: |
              set -e
              npm ci
              npm run build -- --target x86_64-unknown-linux-gnu
              strip -x *.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: |
              set -e
              echo 'Acquire::Retries "3";' | sudo tee /etc/apt/apt.conf.d/80-retries
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
              rustup target add aarch64-unknown-linux-gnu
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
              export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
              export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              npm ci
              npm run build -- --target aarch64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            build: |
              set -e
              rustup target add x86_64-apple-darwin
              npm ci
              npm run build -- --target x86_64-apple-darwin
              strip -x *.node
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              set -e
              sudo rm -Rf /Library/Developer/CommandLineTools/SDKs/*
              export CC=$(xcrun -f clang)
              export CXX=$(xcrun -f clang++)
              SYSROOT=$(xcrun --sdk macosx --show-sdk-path)
              export CFLAGS="-isysroot $SYSROOT -isystem $SYSROOT"
              npm ci
              npm run build -- --target aarch64-apple-darwin
              strip -x *.node
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: |
              npm ci
              npm run build -- --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Build
        working-directory: asherah-node
        shell: bash
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: asherah-node/*.node
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build-bindings
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: bindings-*

      - name: List downloaded artifacts
        run: |
          ls -R artifacts/

      - name: Set beta version
        working-directory: asherah-node
        run: |
          BETA="${{ vars.NPM_BETA_VERSION }}"
          if [ -z "$BETA" ]; then
            echo "::error::Repository variable NPM_BETA_VERSION is not set"
            exit 1
          fi
          VERSION="4.0.0-beta.${BETA}"
          echo "Publishing version: ${VERSION}"
          npm version "$VERSION" --no-git-tag-version
          echo "NPM_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "NPM_BETA=${BETA}" >> "$GITHUB_ENV"

      - name: Place bindings in platform directories
        working-directory: asherah-node
        shell: bash
        run: |
          npm ci --ignore-scripts

          # Map Rust triples to napi platform directory names
          declare -A TRIPLE_MAP=(
            [x86_64-unknown-linux-gnu]=linux-x64-gnu
            [aarch64-unknown-linux-gnu]=linux-arm64-gnu
            [x86_64-apple-darwin]=darwin-x64
            [aarch64-apple-darwin]=darwin-arm64
            [x86_64-pc-windows-msvc]=win32-x64-msvc
          )

          for triple in "${!TRIPLE_MAP[@]}"; do
            platform="${TRIPLE_MAP[$triple]}"
            src="../artifacts/bindings-${triple}"
            dst="npm/${platform}"
            mkdir -p "$dst"
            node_file=$(find "$src" -name "*.node" -print -quit 2>/dev/null)
            if [ -n "$node_file" ]; then
              cp -v "$node_file" "$dst/index.${platform}.node"
            else
              echo "::warning::No binding found for ${triple}"
            fi
          done

          echo "Bindings placed:"
          ls -lh npm/*/index.*.node

      - name: Publish to npm (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: asherah-node
        run: |
          npm pack
          echo "Contents:"
          tar -tzf *.tgz | grep "\.node"
          echo "Dry run complete. Would publish version ${NPM_VERSION}."

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: asherah-node
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Increment beta version
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEXT=$(( NPM_BETA + 1 ))
          if gh variable set NPM_BETA_VERSION --body "$NEXT" 2>/dev/null; then
            echo "Bumped NPM_BETA_VERSION from ${NPM_BETA} to ${NEXT}"
          else
            echo "::warning::Auto-increment failed (GITHUB_TOKEN lacks variable write access). Manually set NPM_BETA_VERSION to ${NEXT} in Settings > Secrets and variables > Actions > Variables."
          fi
